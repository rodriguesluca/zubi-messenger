<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zubi Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --chat-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --message-bg: rgba(59, 130, 246, 0.15);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .chat-container {
            width: 95%;
            max-width: 600px;
            height: 85vh;
            background: var(--chat-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            font-weight: 600;
            font-size: 1.25rem;
            letter-spacing: 0.5px;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .message {
            background: var(--message-bg);
            padding: 12px 16px;
            border-radius: 14px;
            max-width: 80%;
            align-self: flex-start;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            animation: fadeIn 0.3s ease-in-out;
            border: 1px solid var(--border-color);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-input-container {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.5);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        #form {
            display: flex;
            gap: 10px;
        }

        #input {
            flex: 1;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        #input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
        }

        #form button {
            background: linear-gradient(135deg, var(--primary), #6366f1);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.3);
        }

        #form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(59, 130, 246, 0.4);
        }

        #form button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            Zubi Messenger
        </div>
        <div class="chat-messages" id="messages">
            <!-- As mensagens aparecerão aqui -->
        </div>
        <div class="chat-input-container">
            <form id="form" action="">
                <input id="input" autocomplete="off" placeholder="Digite sua mensagem aqui..." required />
                <button type="submit">Enviar</button>
            </form>
        </div>
    </div>

    <!-- Atualizado para uma versão mais recente do Socket.IO para compatibilidade e segurança -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <script>
        // Conexão com o servidor SocketIO
        var socket = io();

        // Recebendo mensagem do servidor e exibindo na tela
        socket.on('message', function(msg) {
            var messagesDiv = document.getElementById('messages');
            var newMessage = document.createElement('div');
            newMessage.className = 'message';
            newMessage.textContent = msg;
            messagesDiv.appendChild(newMessage);
            
            // Auto-scroll para a última mensagem
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });

        // Enviando mensagem ao submeter o formulário
        document.getElementById('form').onsubmit = function(e) {
            e.preventDefault();
            var input = document.getElementById('input');
            if (input.value.trim() !== '') {
                socket.emit('message', input.value);
                input.value = '';
            }
            return false;
        };
    </script>
</body>
</html>
